<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Facebook Open Graph Meta Tags -->
    <meta property="og:url" content="https://facebook-share-five.vercel.app" />
    <meta property="og:title" content="FIFA World Cup 2026 - Ultimate Match Guide" />
    <meta property="og:description" content="Track every match, standings, and highlights from the biggest tournament in football history!" />
    <meta property="og:image" content="https://placehold.co/1200x630/009b3a/FFD700?text=FIFA+World+Cup+2026" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    
    <title>World Cup 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a472a, #2d5016);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: linear-gradient(90deg, #009b3a, #ffd700);
            padding: 24px;
            color: white;
        }

        .header h1 { font-size: 24px; margin-bottom: 4px; }
        .header span { font-size: 14px; opacity: 0.9; }

        .hero {
            height: 300px;
            background: linear-gradient(135deg, #009b3a 0%, #0d3b1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(255,255,255,0.03) 30px, rgba(255,255,255,0.03) 31px);
        }

        .ball {
            font-size: 80px;
            z-index: 1;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .hero h2 { 
            font-size: 32px; 
            z-index: 1; 
            margin-top: 16px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        .content { padding: 24px; background: #f8f9fa; }

        .match {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: white;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .match:last-child { margin-bottom: 0; }

        .team { display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .flag { font-size: 28px; }
        .vs { 
            background: #e4e6eb; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 600;
            color: #65676b;
        }

        .footer {
            padding: 20px 24px;
            border-top: 1px solid #e4e6eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats { color: #65676b; font-size: 14px; }

        .fb-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fb-btn:hover { background: #166fe5; transform: translateY(-2px); }
        .fb-btn svg { width: 20px; height: 20px; fill: white; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1c1e21;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>FIFA World Cup 2026</h1>
            <span>USA · Canada · Mexico | June 11 - July 19, 2026</span>
        </div>

        <div class="hero">
            <div class="ball">⚽</div>
            <h2>WORLD CUP 2026</h2>
        </div>

        <div class="content">
            <div class="match">
                <div class="team"><span class="flag">🇺🇸</span> USA</div>
                <div class="vs">VS</div>
                <div class="team"><span class="flag">🇲🇽</span> Mexico</div>
            </div>
            <div class="match">
                <div class="team"><span class="flag">🇧🇷</span> Brazil</div>
                <div class="vs">VS</div>
                <div class="team"><span class="flag">🇦🇷</span> Argentina</div>
            </div>
            <div class="match">
                <div class="team"><span class="flag">🇫🇷</span> France</div>
                <div class="vs">VS</div>
                <div class="team"><span class="flag">🇩🇪</span> Germany</div>
            </div>
        </div>

        <div class="footer">
            <div class="stats">👍 12.5K · 💬 3.2K</div>
            <button class="fb-btn" onclick="shareOnFacebook()">
                <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                Share on Facebook
            </button>
        </div>
    </div>

    <div class="toast" id="toast">✅ Opening Facebook...</div>

    <script>
        // Your actual Vercel domain
        const SITE_URL = 'https://facebook-share-five.vercel.app';

        function shareOnFacebook() {
            const encodedUrl = encodeURIComponent(SITE_URL);
            const shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;
            
            window.open(shareUrl, 'fb-share', 'width=626,height=436');
            
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        }
    </script>

</body>
</html>
